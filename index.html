<!DOCTYPE html>
<html lang="pt-BR" data-tema="claro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Busca Licitações – Arantes Papéis</title>
  <style>
    :root{
      --bg:#f4f6f8;--surface:#fff;--surface2:#f8f9fa;--border:#e0e0e0;
      --text:#222;--text2:#555;--text3:#888;--text4:#999;
      --primary:#1a3d2b;--primary-hover:#245239;--accent:#d4a825;
      --chip-bg:#eef5f1;--chip-border:#c5ddd0;
      --card-shadow:0 2px 6px rgba(0,0,0,.06);--card-shadow-hover:0 4px 14px rgba(0,0,0,.12);
      --drawer-bg:#fff;--overlay:rgba(0,0,0,.4);
      --badge-verde-bg:#e6f4ec;--badge-verde-txt:#1a7a3c;
      --badge-amarelo-bg:#fff8e1;--badge-amarelo-txt:#b8860b;
      --badge-cinza-bg:#f0f0f0;--badge-cinza-txt:#666;
      --erro-bg:#fff3f3;--erro-border:#f5c6c6;--erro-txt:#c0392b;
    }
    [data-tema="escuro"]{
      --bg:#0d1117;--surface:#161b27;--surface2:#1e2538;--border:#2a3050;
      --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--text4:#475569;
      --primary:#1a3d2b;--primary-hover:#245239;--accent:#d4a825;
      --chip-bg:#1e2d24;--chip-border:#2d4a38;
      --card-shadow:0 2px 6px rgba(0,0,0,.3);--card-shadow-hover:0 4px 14px rgba(0,0,0,.5);
      --drawer-bg:#161b27;--overlay:rgba(0,0,0,.6);
      --badge-verde-bg:#0d2b1a;--badge-verde-txt:#4ade80;
      --badge-amarelo-bg:#2b2000;--badge-amarelo-txt:#fbbf24;
      --badge-cinza-bg:#1e2538;--badge-cinza-txt:#94a3b8;
      --erro-bg:#2b0d0d;--erro-border:#7f1d1d;--erro-txt:#fca5a5;
    }
    *{box-sizing:border-box;margin:0;padding:0;transition:background-color .2s,color .2s,border-color .2s}
    body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}
    header{background:var(--primary);color:var(--accent);padding:18px 32px;display:flex;justify-content:space-between;align-items:center}
    header h1{font-size:1.4rem;font-weight:700;letter-spacing:1px}
    header span{font-size:.85rem;color:#aaa}
    .btn-tema{background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .btn-tema:hover{background:rgba(255,255,255,.25)}
    .container{max-width:1100px;margin:0 auto;padding:24px 16px}
    .filtros{background:var(--surface);border-radius:10px;padding:20px;box-shadow:var(--card-shadow);display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:8px;border:1px solid var(--border)}
    .filtros .campo-busca{grid-column:1/-1;display:flex;gap:10px}
    .filtros input,.filtros select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:.95rem;background:var(--surface2);color:var(--text)}
    .filtros input:focus,.filtros select:focus{outline:none;border-color:var(--primary)}
    .btn-buscar{background:var(--primary);color:var(--accent);border:none;padding:10px 28px;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;white-space:nowrap}
    .btn-buscar:hover{background:var(--primary-hover)}
    .btn-buscar:disabled{background:var(--text3);cursor:wait}
    .btn-limpar{background:transparent;color:var(--text3);border:1px solid var(--border);padding:10px 16px;border-radius:8px;font-size:.9rem;cursor:pointer}
    .historico-box{background:var(--surface);border-radius:10px;padding:12px 16px;box-shadow:var(--card-shadow);margin-bottom:16px;display:none;border:1px solid var(--border)}
    .historico-label{font-size:.78rem;color:var(--text4);margin-bottom:8px;display:flex;justify-content:space-between}
    .historico-label button{background:none;border:none;color:#ef4444;font-size:.78rem;cursor:pointer}
    .historico-chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip{background:var(--chip-bg);color:var(--primary);border:1px solid var(--chip-border);border-radius:20px;padding:4px 12px;font-size:.82rem;cursor:pointer;display:flex;align-items:center;gap:6px}
    .chip:hover{opacity:.8}
    .chip-x{color:var(--text3);font-size:.75rem;cursor:pointer}
    .resumo{font-size:.9rem;color:var(--text2);margin-bottom:14px}
    .resumo strong{color:var(--primary)}
    [data-tema="escuro"] .resumo strong{color:var(--accent)}
    .cards{display:flex;flex-direction:column;gap:12px}
    .card{background:var(--surface);border-radius:10px;padding:18px 20px;box-shadow:var(--card-shadow);border-left:5px solid var(--primary);cursor:pointer}
    .card:hover{box-shadow:var(--card-shadow-hover);border-left-color:var(--accent)}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:6px}
    .card-titulo{font-weight:600;font-size:.95rem;color:var(--primary)}
    [data-tema="escuro"] .card-titulo{color:var(--accent)}
    .card-desc{font-size:.88rem;color:var(--text);margin-bottom:8px;line-height:1.4}
    .badge{font-size:.75rem;padding:3px 10px;border-radius:20px;white-space:nowrap;font-weight:600}
    .badge-verde{background:var(--badge-verde-bg);color:var(--badge-verde-txt)}
    .badge-amarelo{background:var(--badge-amarelo-bg);color:var(--badge-amarelo-txt)}
    .badge-cinza{background:var(--badge-cinza-bg);color:var(--badge-cinza-txt)}
    .card-info{display:flex;flex-wrap:wrap;gap:14px;font-size:.82rem;color:var(--text2);margin-bottom:4px}
    .card-orgao{font-size:.8rem;color:var(--text3)}
    .paginacao{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:24px}
    .btn-pag{background:var(--primary);color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:.9rem}
    .btn-pag:disabled{background:var(--border);color:var(--text3);cursor:default}
    .pagina-info{font-size:.9rem;color:var(--text2)}
    .loading{text-align:center;padding:40px;color:var(--text3)}
    .erro{background:var(--erro-bg);border:1px solid var(--erro-border);color:var(--erro-txt);padding:16px;border-radius:8px;text-align:center}
    .vazio{text-align:center;padding:40px;color:var(--text3)}

    /* DRAWER */
    .overlay{position:fixed;inset:0;background:var(--overlay);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
    .overlay.ativo{opacity:1;pointer-events:all}
    .drawer{position:fixed;top:0;right:-660px;width:640px;max-width:95vw;height:100vh;background:var(--drawer-bg);z-index:101;box-shadow:-4px 0 24px rgba(0,0,0,.3);transition:right .3s ease;overflow-y:auto;display:flex;flex-direction:column;border-left:1px solid var(--border)}
    .drawer.ativo{right:0}
    .drawer-header{background:var(--primary);color:var(--accent);padding:20px 20px 16px;position:sticky;top:0;z-index:1}
    .drawer-header h2{font-size:1rem;font-weight:700;margin-bottom:4px}
    .drawer-sub{font-size:.8rem;color:#aaa}
    .drawer-fechar{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .drawer-fechar:hover{background:rgba(255,255,255,.3)}
    .drawer-body{padding:20px;flex:1}
    .drawer-section{margin-bottom:20px}
    .drawer-section h3{font-size:.8rem;text-transform:uppercase;color:var(--text3);letter-spacing:1px;margin-bottom:8px}
    .drawer-desc{font-size:.9rem;color:var(--text);line-height:1.5}
    .drawer-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .drawer-campo{background:var(--surface2);border-radius:8px;padding:10px 12px;border:1px solid var(--border)}
    .drawer-campo label{font-size:.72rem;color:var(--text3);display:block;margin-bottom:3px;text-transform:uppercase}
    .drawer-campo span{font-size:.9rem;color:var(--text);font-weight:600}
    .drawer-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
    .drawer-tag{background:var(--chip-bg);color:var(--primary);border:1px solid var(--chip-border);border-radius:20px;padding:3px 10px;font-size:.78rem;font-weight:600}
    [data-tema="escuro"] .drawer-tag{color:var(--accent)}
    .drawer-btn{display:block;width:100%;padding:12px;background:var(--primary);color:var(--accent);border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;margin-bottom:10px;text-align:center}
    .drawer-btn:hover{background:var(--primary-hover)}
    .drawer-btn-sec{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
    .drawer-btn-sec:hover{background:var(--border)}

    /* ITENS ACCORDION */
    .item-lista{display:flex;flex-direction:column;gap:6px}
    .item-accordion{border:1px solid var(--border);border-radius:8px;overflow:hidden}
    .item-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:var(--surface2)}
    .item-header:hover{filter:brightness(1.05)}
    .item-num-badge{background:var(--primary);color:var(--accent);border-radius:6px;padding:2px 8px;font-size:.75rem;font-weight:700;white-space:nowrap;min-width:56px;text-align:center}
    .item-resumo{flex:1}
    .item-nome{font-size:.88rem;font-weight:600;color:var(--text)}
    .item-qtd{font-size:.78rem;color:var(--text2);margin-top:2px}
    .item-chevron{color:var(--text3);font-size:.85rem;transition:transform .2s;flex-shrink:0}
    .item-chevron.aberto{transform:rotate(180deg)}
    .item-detalhe{display:none;padding:14px;background:var(--surface);border-top:1px solid var(--border)}
    .item-detalhe.aberto{display:block}
    .item-detalhe-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
    .item-detalhe-campo{background:var(--surface2);border-radius:6px;padding:8px 10px;border:1px solid var(--border)}
    .item-detalhe-campo label{font-size:.7rem;color:var(--text3);display:block;text-transform:uppercase;margin-bottom:2px}
    .item-detalhe-campo span{font-size:.85rem;font-weight:600;color:var(--text)}
    .item-desc-full{font-size:.82rem;color:var(--text2);line-height:1.5;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
    .item-loading{text-align:center;padding:20px;color:var(--text3);font-size:.9rem}

    @media(max-width:700px){.filtros{grid-template-columns:1fr}.filtros .campo-busca{flex-direction:column}.drawer{width:100%;right:-100%}.drawer-grid{grid-template-columns:1fr}.item-detalhe-grid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
<header>
  <div>
    <h1>🔍 Busca de Licitações</h1>
    <span>Arantes Papéis · Portal Nacional de Contratações Públicas</span>
  </div>
  <button class="btn-tema" id="btnTema" onclick="alternarTema()" title="Alternar tema">🌙</button>
</header>

<div class="container">
  <div class="filtros">
    <div class="campo-busca">
      <input type="text" id="palavraChave" placeholder="Palavra-chave (ex: papel, bobina, kraft, embalagem...)"/>
      <button class="btn-buscar" id="btnBuscar" onclick="buscar(1)">Buscar</button>
      <button class="btn-limpar" onclick="limpar()">Limpar</button>
    </div>
    <select id="uf">
      <option value="">Todos os estados</option>
      <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
      <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
      <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
      <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
      <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
      <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
      <option>SP</option><option>SE</option><option>TO</option>
    </select>
    <select id="modalidade">
      <option value="">Todas as modalidades</option>
      <option value="6">Pregão Eletrônico</option>
      <option value="8">Dispensa de Licitação</option>
      <option value="4">Concorrência Eletrônica</option>
      <option value="9">Inexigibilidade</option>
      <option value="7">Pregão Presencial</option>
      <option value="5">Concorrência Presencial</option>
    </select>
    <select id="status">
      <option value="recebendo_proposta">Recebendo proposta</option>
      <option value="em_julgamento">Em julgamento</option>
      <option value="encerrada">Encerrada</option>
      <option value="">Todos</option>
    </select>
  </div>

  <div class="historico-box" id="historicoBox">
    <div class="historico-label">
      <span>🕒 Buscas recentes</span>
      <button onclick="limparHistorico()">Limpar tudo</button>
    </div>
    <div class="historico-chips" id="historicoChips"></div>
  </div>

  <div id="resumo" class="resumo"></div>
  <div id="resultado"></div>
  <div class="paginacao" id="paginacao" style="display:none">
    <button class="btn-pag" id="btnAnterior" onclick="mudarPagina(-1)">← Anterior</button>
    <span class="pagina-info" id="paginaInfo"></span>
    <button class="btn-pag" id="btnProxima" onclick="mudarPagina(1)">Próxima →</button>
  </div>
</div>

<div class="overlay" id="overlay" onclick="fecharDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <button class="drawer-fechar" onclick="fecharDrawer()">✕</button>
    <h2 id="d-titulo">Carregando...</h2>
    <div class="drawer-sub" id="d-numero"></div>
  </div>
  <div class="drawer-body">
    <div class="drawer-tags" id="d-tags"></div>
    <div class="drawer-section">
      <h3>Objeto</h3>
      <div class="drawer-desc" id="d-objeto"></div>
    </div>
    <div class="drawer-section">
      <div class="drawer-grid">
        <div class="drawer-campo"><label>Órgão</label><span id="d-orgao"></span></div>
        <div class="drawer-campo"><label>Unidade</label><span id="d-unidade"></span></div>
        <div class="drawer-campo"><label>Estado</label><span id="d-uf"></span></div>
        <div class="drawer-campo"><label>Modalidade</label><span id="d-modalidade"></span></div>
        <div class="drawer-campo"><label>Abertura</label><span id="d-abertura"></span></div>
        <div class="drawer-campo"><label>Encerramento</label><span id="d-encerramento"></span></div>
        <div class="drawer-campo"><label>Valor estimado</label><span id="d-valor"></span></div>
        <div class="drawer-campo"><label>Situação</label><span id="d-situacao"></span></div>
      </div>
    </div>
    <button class="drawer-btn" id="d-btn-acessar">📄 Acessar edital no PNCP</button>
    <button class="drawer-btn drawer-btn-sec" id="d-btn-busca">🔍 Buscar no PNCP</button>
    <div class="drawer-section">
      <h3>Itens do pregão</h3>
      <div id="d-itens"><div class="item-loading">⏳ Carregando itens...</div></div>
    </div>
  </div>
</div>

<script>
  let paginaAtual=1,totalPaginas=1;
  const HIST_KEY='buscaLicitacoes_historico';
  const TEMA_KEY='buscaLicitacoes_tema';

  // TEMA
  function alternarTema(){
    const html=document.documentElement;
    const atual=html.getAttribute('data-tema');
    const novo=atual==='escuro'?'claro':'escuro';
    html.setAttribute('data-tema',novo);
    document.getElementById('btnTema').textContent=novo==='escuro'?'☀️':'🌙';
    localStorage.setItem(TEMA_KEY,novo);
  }
  function carregarTema(){
    const t=localStorage.getItem(TEMA_KEY)||'claro';
    document.documentElement.setAttribute('data-tema',t);
    document.getElementById('btnTema').textContent=t==='escuro'?'☀️':'🌙';
  }

  // HISTÓRICO
  function getHistorico(){try{return JSON.parse(localStorage.getItem(HIST_KEY)||'[]')}catch{return[]}}
  function salvarHistorico(kw,uf,mod,st){
    if(!kw)return;
    const h=getHistorico().filter(x=>x.kw!==kw);
    h.unshift({kw,uf,mod,st});
    localStorage.setItem(HIST_KEY,JSON.stringify(h.slice(0,15)));
    renderHistorico();
  }
  function renderHistorico(){
    const h=getHistorico();
    const box=document.getElementById('historicoBox');
    const chips=document.getElementById('historicoChips');
    if(!h.length){box.style.display='none';return}
    box.style.display='block';
    chips.innerHTML=h.map((x,i)=>`
      <span class="chip" onclick="aplicarHistorico(${i})">
        ${x.kw}${x.uf?' · '+x.uf:''}
        <span class="chip-x" onclick="event.stopPropagation();removerHistorico(${i})">✕</span>
      </span>`).join('');
  }
  function aplicarHistorico(i){const h=getHistorico()[i];if(!h)return;document.getElementById('palavraChave').value=h.kw;document.getElementById('uf').value=h.uf||'';document.getElementById('modalidade').value=h.mod||'';document.getElementById('status').value=h.st||'recebendo_proposta';buscar(1)}
  function removerHistorico(i){const h=getHistorico();h.splice(i,1);localStorage.setItem(HIST_KEY,JSON.stringify(h));renderHistorico()}
  function limparHistorico(){localStorage.removeItem(HIST_KEY);renderHistorico()}

  function fmt(iso){if(!iso)return'—';return new Date(iso).toLocaleString('pt-BR',{dateStyle:'short',timeStyle:'short'})}
  function fmtVal(v){if(!v)return'Não informado';return Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}

  function statusBadge(item){
    if(item.cancelado)return{texto:'Cancelado',cls:'badge-cinza'};
    const agora=new Date(),fim=item.data_fim_vigencia?new Date(item.data_fim_vigencia):null,ini=item.data_inicio_vigencia?new Date(item.data_inicio_vigencia):null;
    if(fim&&agora>fim)return{texto:'Encerrado',cls:'badge-cinza'};
    if(ini&&agora>=ini)return{texto:'Recebendo proposta',cls:'badge-verde'};
    return{texto:'Aguardando abertura',cls:'badge-amarelo'};
  }

  function parseControle(c){
    if(!c)return null;
    const m=c.match(/^(\d+)-(\d+)-(\d+)\/(\d+)$/);
    if(!m)return null;
    return{cnpj:m[1],seqOrgao:m[2],seq:parseInt(m[3]),ano:m[4]};
  }
  function buildLinks(item){
    const p=parseControle(item.numero_controle_pncp);
    if(!p)return{direto:'',busca:''};
    return{
      direto:`https://pncp.gov.br/app/editais/${p.cnpj}/${p.ano}/${p.seq}`,
      busca:`https://pncp.gov.br/app/editais/${p.cnpj}/${p.ano}/${p.seq}`
    };
  }

  function toggleItem(i){
    document.getElementById('det-'+i).classList.toggle('aberto');
    document.getElementById('chev-'+i).classList.toggle('aberto');
  }

  function abrirDrawer(item){
    const{direto}=buildLinks(item);
    const badge=statusBadge(item);
    document.getElementById('d-titulo').textContent=item.title||'Sem título';
    document.getElementById('d-numero').textContent=item.numero_controle_pncp||'';
    document.getElementById('d-objeto').textContent=item.description||'—';
    document.getElementById('d-orgao').textContent=item.orgao_nome||'—';
    document.getElementById('d-unidade').textContent=item.unidade_nome||'—';
    document.getElementById('d-uf').textContent=(item.uf||'—')+' · '+(item.municipio_nome||'');
    document.getElementById('d-modalidade').textContent=item.modalidade_licitacao_nome||'—';
    document.getElementById('d-abertura').textContent=fmt(item.data_inicio_vigencia);
    document.getElementById('d-encerramento').textContent=fmt(item.data_fim_vigencia);
    document.getElementById('d-valor').textContent=fmtVal(item.valor_global);
    document.getElementById('d-situacao').textContent=badge.texto;
    document.getElementById('d-tags').innerHTML=`
      <span class="drawer-tag">${item.modalidade_licitacao_nome||'—'}</span>
      <span class="drawer-tag badge ${badge.cls}">${badge.texto}</span>
      ${item.esfera_nome?`<span class="drawer-tag">${item.esfera_nome}</span>`:''}`;
    document.getElementById('d-btn-acessar').onclick=()=>window.open(direto,'_blank');
    document.getElementById('d-btn-busca').onclick=()=>window.open(direto,'_blank');
    document.getElementById('d-btn-acessar').style.display=direto?'block':'none';
    document.getElementById('d-itens').innerHTML='<div class="item-loading">⏳ Carregando itens...</div>';
    document.getElementById('drawer').classList.add('ativo');
    document.getElementById('overlay').classList.add('ativo');
    document.body.style.overflow='hidden';
    const p=parseControle(item.numero_controle_pncp);
    if(p)carregarItens(p.cnpj,p.ano,p.seq);
  }

  function fecharDrawer(){
    document.getElementById('drawer').classList.remove('ativo');
    document.getElementById('overlay').classList.remove('ativo');
    document.body.style.overflow='';
  }

  async function carregarItens(cnpj,ano,seq){
    try{
      const r=await fetch(`/api/itens?cnpj=${cnpj}&ano=${ano}&sequencial=${seq}`);
      const data=await r.json();
      const itens=data.data||[];
      if(!itens.length){document.getElementById('d-itens').innerHTML='<div class="item-loading">Nenhum item encontrado.</div>';return}
      document.getElementById('d-itens').innerHTML=`<div class="item-lista">${itens.map((it,i)=>{
        const nomeResumido=(it.descricao||'Sem descrição').substring(0,70)+((it.descricao||'').length>70?'...':'');
        const val=it.valorUnitarioEstimado?fmtVal(it.valorUnitarioEstimado):'Não informado';
        const valTotal=it.valorTotal?fmtVal(it.valorTotal):'Não informado';
        return`<div class="item-accordion">
          <div class="item-header" onclick="toggleItem(${i})">
            <span class="item-num-badge">Item ${it.numeroItem||i+1}</span>
            <div class="item-resumo">
              <div class="item-nome">${nomeResumido}</div>
              <div class="item-qtd">Qtd: <strong>${it.quantidade||'—'} ${it.unidadeMedida||''}</strong></div>
            </div>
            <span class="item-chevron" id="chev-${i}">▼</span>
          </div>
          <div class="item-detalhe" id="det-${i}">
            <div class="item-detalhe-grid">
              <div class="item-detalhe-campo"><label>Quantidade</label><span>${it.quantidade||'—'} ${it.unidadeMedida||''}</span></div>
              <div class="item-detalhe-campo"><label>Vlr. unitário</label><span>${val}</span></div>
              <div class="item-detalhe-campo"><label>Vlr. total</label><span>${valTotal}</span></div>
              <div class="item-detalhe-campo"><label>Tipo</label><span>${it.materialOuServicoNome||'—'}</span></div>
              <div class="item-detalhe-campo"><label>Situação</label><span>${it.situacaoCompraItemNome||'—'}</span></div>
              <div class="item-detalhe-campo"><label>Julgamento</label><span>${it.criterioJulgamentoNome||'—'}</span></div>
            </div>
            <div class="item-desc-full">${it.descricao||'Sem descrição'}</div>
          </div>
        </div>`}).join('')}</div>`;
    }catch(e){document.getElementById('d-itens').innerHTML='<div class="item-loading">Erro ao carregar itens.</div>'}
  }

  async function buscar(pagina){
    paginaAtual=pagina;
    const kw=document.getElementById('palavraChave').value.trim();
    const uf=document.getElementById('uf').value;
    const mod=document.getElementById('modalidade').value;
    const st=document.getElementById('status').value;
    const params=new URLSearchParams({pagina});
    if(kw)params.append('palavraChave',kw);
    if(uf)params.append('uf',uf);
    if(mod)params.append('modalidade',mod);
    if(st)params.append('status',st);
    const btn=document.getElementById('btnBuscar');
    btn.disabled=true;btn.textContent='Buscando...';
    document.getElementById('resultado').innerHTML='<div class="loading">⏳ Buscando licitações...</div>';
    document.getElementById('paginacao').style.display='none';
    document.getElementById('resumo').innerHTML='';
    try{
      const resp=await fetch(`/api/buscar?${params}`);
      const data=await resp.json();
      if(data.erro){document.getElementById('resultado').innerHTML=`<div class="erro">Erro: ${data.erro}</div>`;return}
      salvarHistorico(kw,uf,mod,st);
      const itens=data.data||[];
      const total=data.totalRegistros||0;
      totalPaginas=data.totalPaginas||1;
      document.getElementById('resumo').innerHTML=`<strong>${total.toLocaleString('pt-BR')}</strong> licitações encontradas · Página ${paginaAtual} de ${totalPaginas}`;
      if(!itens.length){document.getElementById('resultado').innerHTML='<div class="vazio">Nenhuma licitação encontrada.</div>';return}
      const html=itens.map(item=>{
        const badge=statusBadge(item);
        return`<div class="card" onclick='abrirDrawer(${JSON.stringify(item)})'>
          <div class="card-header">
            <div class="card-titulo">${item.title||'Sem título'}</div>
            <span class="badge ${badge.cls}">${badge.texto}</span>
          </div>
          <div class="card-desc">${item.description||'—'}</div>
          <div class="card-info">
            <span>📍 ${item.uf||'—'} · ${item.municipio_nome||''}</span>
            <span>📋 ${item.modalidade_licitacao_nome||'—'}</span>
            <span>📅 Abertura: ${fmt(item.data_inicio_vigencia)}</span>
            <span>⏰ Encerra: ${fmt(item.data_fim_vigencia)}</span>
          </div>
          <div class="card-orgao">🏛️ ${item.orgao_nome||'—'}</div>
        </div>`;
      }).join('');
      document.getElementById('resultado').innerHTML=`<div class="cards">${html}</div>`;
      document.getElementById('paginacao').style.display='flex';
      document.getElementById('paginaInfo').textContent=`Página ${paginaAtual} de ${totalPaginas}`;
      document.getElementById('btnAnterior').disabled=paginaAtual<=1;
      document.getElementById('btnProxima').disabled=paginaAtual>=totalPaginas;
    }catch(e){
      document.getElementById('resultado').innerHTML=`<div class="erro">Erro de conexão: ${e.message}</div>`;
    }finally{btn.disabled=false;btn.textContent='Buscar'}
  }

  function mudarPagina(d){const n=paginaAtual+d;if(n>=1&&n<=totalPaginas)buscar(n)}
  function limpar(){
    document.getElementById('palavraChave').value='';
    document.getElementById('uf').value='';
    document.getElementById('modalidade').value='';
    document.getElementById('status').value='recebendo_proposta';
    document.getElementById('resultado').innerHTML='';
    document.getElementById('resumo').innerHTML='';
    document.getElementById('paginacao').style.display='none';
  }
  document.getElementById('palavraChave').addEventListener('keydown',e=>{if(e.key==='Enter')buscar(1)});
  carregarTema();
  renderHistorico();
</script>
</body>
</html>
