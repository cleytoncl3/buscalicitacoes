<!DOCTYPE html>
<html lang="pt-BR" data-tema="claro">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Busca Licitações – Arantes Papéis</title>
  <style>
    :root{
      --bg:#f4f6f8;--surface:#fff;--surface2:#f8f9fa;--border:#e0e0e0;
      --text:#222;--text2:#555;--text3:#888;--text4:#999;
      --primary:#1a3d2b;--primary-hover:#245239;--accent:#d4a825;
      --chip-bg:#eef5f1;--chip-border:#c5ddd0;
      --card-shadow:0 2px 6px rgba(0,0,0,.06);--card-shadow-hover:0 4px 14px rgba(0,0,0,.12);
      --drawer-bg:#fff;--overlay:rgba(0,0,0,.4);
      --badge-verde-bg:#e6f4ec;--badge-verde-txt:#1a7a3c;
      --badge-amarelo-bg:#fff8e1;--badge-amarelo-txt:#b8860b;
      --badge-cinza-bg:#f0f0f0;--badge-cinza-txt:#666;
      --erro-bg:#fff3f3;--erro-border:#f5c6c6;--erro-txt:#c0392b;
    }
    [data-tema="escuro"]{
      --bg:#0d1117;--surface:#161b27;--surface2:#1e2538;--border:#2a3050;
      --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--text4:#475569;
      --chip-bg:#1e2d24;--chip-border:#2d4a38;
      --card-shadow:0 2px 6px rgba(0,0,0,.3);--card-shadow-hover:0 4px 14px rgba(0,0,0,.5);
      --drawer-bg:#161b27;--overlay:rgba(0,0,0,.6);
      --badge-verde-bg:#0d2b1a;--badge-verde-txt:#4ade80;
      --badge-amarelo-bg:#2b2000;--badge-amarelo-txt:#fbbf24;
      --badge-cinza-bg:#1e2538;--badge-cinza-txt:#94a3b8;
      --erro-bg:#2b0d0d;--erro-border:#7f1d1d;--erro-txt:#fca5a5;
    }
    *{box-sizing:border-box;margin:0;padding:0;transition:background-color .2s,color .2s,border-color .2s}
    body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text)}

    /* HEADER */
    header{background:var(--primary);color:var(--accent);padding:0 32px;display:flex;justify-content:space-between;align-items:center;height:58px;position:sticky;top:0;z-index:300}
    .header-left{display:flex;align-items:center;gap:24px}
    .header-logo{font-size:1.2rem;font-weight:700;letter-spacing:1px;white-space:nowrap;color:var(--accent)}
    .header-logo span{font-size:.75rem;color:#aaa;display:block;font-weight:400;letter-spacing:0}
    .nav{display:flex;gap:4px}
    .nav-btn{background:transparent;border:none;color:rgba(255,255,255,.7);padding:8px 14px;border-radius:8px;font-size:.9rem;cursor:pointer;display:flex;align-items:center;gap:6px;position:relative;white-space:nowrap}
    .nav-btn:hover,.nav-btn.ativo{background:rgba(255,255,255,.15);color:#fff}
    .nav-btn.ativo{color:var(--accent)}
    .dropdown{position:absolute;top:calc(100% + 6px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);min-width:200px;z-index:400;display:none;padding:4px}
    .dropdown.aberto{display:block}
    .dropdown-item{display:flex;align-items:center;gap:10px;padding:10px 14px;font-size:.88rem;color:var(--text);cursor:pointer;border-radius:7px}
    .dropdown-item:hover{background:var(--chip-bg);color:var(--primary)}
    [data-tema="escuro"] .dropdown-item:hover{color:var(--accent)}
    .dropdown-sep{height:1px;background:var(--border);margin:4px 0}
    .header-right{display:flex;align-items:center;gap:10px}
    .btn-tema{background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:1.1rem;cursor:pointer}
    .btn-tema:hover{background:rgba(255,255,255,.25)}

    /* SININHO */
    .btn-sino{background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:1rem;cursor:pointer;position:relative;display:flex;align-items:center;justify-content:center}
    .btn-sino:hover{background:rgba(255,255,255,.25)}
    .sino-badge{position:absolute;top:-4px;right:-4px;background:#ef4444;color:#fff;font-size:.6rem;font-weight:700;border-radius:20px;padding:1px 5px;min-width:16px;text-align:center;display:none}
    .sino-badge.visivel{display:block}
    .notif-panel{position:absolute;top:calc(100% + 8px);right:0;width:360px;background:var(--surface);border:1px solid var(--border);border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,.15);z-index:400;display:none;max-height:500px;overflow-y:auto}
    .notif-panel.aberto{display:block}
    .notif-header{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .notif-header span{font-weight:600;font-size:.9rem}
    .notif-header button{background:none;border:none;color:#ef4444;font-size:.78rem;cursor:pointer}
    .notif-item{padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer}
    .notif-item:hover{background:var(--surface2)}
    .notif-item:last-child{border-bottom:none}
    .notif-titulo{font-size:.85rem;font-weight:600;color:var(--text);margin-bottom:3px}
    .notif-desc{font-size:.78rem;color:var(--text2)}
    .notif-data{font-size:.72rem;color:var(--text3);margin-top:3px}
    .notif-vazia{padding:24px;text-align:center;color:var(--text3);font-size:.88rem}
    .notif-wrapper{position:relative}

    /* CONTAINER / VIEWS */
    .container{max-width:1100px;margin:0 auto;padding:24px 16px}
    .view{display:none}
    .view.ativo{display:block}

    /* FILTROS */
    .filtros{background:var(--surface);border-radius:10px;padding:20px;box-shadow:var(--card-shadow);display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:8px;border:1px solid var(--border)}
    .filtros .campo-busca{grid-column:1/-1;display:flex;gap:10px}
    .filtros input,.filtros select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:.95rem;background:var(--surface2);color:var(--text)}
    .filtros input:focus,.filtros select:focus{outline:none;border-color:var(--primary)}
    .btn-buscar{background:var(--primary);color:var(--accent);border:none;padding:10px 28px;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;white-space:nowrap}
    .btn-buscar:hover{background:var(--primary-hover)}
    .btn-buscar:disabled{background:var(--text3);cursor:wait}
    .btn-limpar{background:transparent;color:var(--text3);border:1px solid var(--border);padding:10px 16px;border-radius:8px;font-size:.9rem;cursor:pointer}

    /* HISTÓRICO */
    .historico-box{background:var(--surface);border-radius:10px;padding:12px 16px;box-shadow:var(--card-shadow);margin-bottom:16px;display:none;border:1px solid var(--border)}
    .historico-label{font-size:.78rem;color:var(--text4);margin-bottom:8px;display:flex;justify-content:space-between}
    .historico-label button{background:none;border:none;color:#ef4444;font-size:.78rem;cursor:pointer}
    .historico-chips{display:flex;flex-wrap:wrap;gap:8px}
    .chip{background:var(--chip-bg);color:var(--primary);border:1px solid var(--chip-border);border-radius:20px;padding:4px 12px;font-size:.82rem;cursor:pointer;display:flex;align-items:center;gap:6px}
    [data-tema="escuro"] .chip{color:var(--accent)}
    .chip-x{color:var(--text3);font-size:.75rem;cursor:pointer}
    .resumo{font-size:.9rem;color:var(--text2);margin-bottom:14px}
    .resumo strong{color:var(--primary)}
    [data-tema="escuro"] .resumo strong{color:var(--accent)}
    .cards{display:flex;flex-direction:column;gap:12px}
    .card{background:var(--surface);border-radius:10px;padding:18px 20px;box-shadow:var(--card-shadow);border-left:5px solid var(--primary);cursor:pointer}
    .card:hover{box-shadow:var(--card-shadow-hover);border-left-color:var(--accent)}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:6px}
    .card-titulo{font-weight:600;font-size:.95rem;color:var(--primary)}
    [data-tema="escuro"] .card-titulo{color:var(--accent)}
    .card-desc{font-size:.88rem;color:var(--text);margin-bottom:8px;line-height:1.4}
    .badge{font-size:.75rem;padding:3px 10px;border-radius:20px;white-space:nowrap;font-weight:600}
    .badge-verde{background:var(--badge-verde-bg);color:var(--badge-verde-txt)}
    .badge-amarelo{background:var(--badge-amarelo-bg);color:var(--badge-amarelo-txt)}
    .badge-cinza{background:var(--badge-cinza-bg);color:var(--badge-cinza-txt)}
    .card-info{display:flex;flex-wrap:wrap;gap:14px;font-size:.82rem;color:var(--text2);margin-bottom:4px}
    .card-orgao{font-size:.8rem;color:var(--text3)}
    .paginacao{display:flex;justify-content:center;align-items:center;gap:10px;margin-top:24px}
    .btn-pag{background:var(--primary);color:#fff;border:none;padding:8px 20px;border-radius:8px;cursor:pointer;font-size:.9rem}
    .btn-pag:disabled{background:var(--border);color:var(--text3);cursor:default}
    .pagina-info{font-size:.9rem;color:var(--text2)}
    .loading{text-align:center;padding:40px;color:var(--text3)}
    .erro{background:var(--erro-bg);border:1px solid var(--erro-border);color:var(--erro-txt);padding:16px;border-radius:8px;text-align:center}
    .vazio{text-align:center;padding:40px;color:var(--text3)}

    /* MEUS JORNAIS */
    .jornais-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .jornais-header h2{font-size:1.1rem;font-weight:700}
    .btn-novo-jornal{background:var(--primary);color:var(--accent);border:none;padding:10px 18px;border-radius:8px;font-size:.9rem;font-weight:700;cursor:pointer}
    .btn-novo-jornal:hover{background:var(--primary-hover)}
    .jornais-lista{display:flex;flex-direction:column;gap:12px}
    .jornal-card{background:var(--surface);border-radius:10px;padding:18px 20px;box-shadow:var(--card-shadow);border:1px solid var(--border);border-left:5px solid var(--accent)}
    .jornal-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .jornal-nome{font-weight:700;font-size:1rem;color:var(--text)}
    .jornal-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
    .jornal-chip{background:var(--chip-bg);color:var(--primary);border:1px solid var(--chip-border);border-radius:20px;padding:3px 10px;font-size:.78rem;font-weight:600}
    [data-tema="escuro"] .jornal-chip{color:var(--accent)}
    .jornal-meta{font-size:.78rem;color:var(--text3);margin-bottom:10px}
    .jornal-actions{display:flex;gap:8px}
    .jornal-btn{font-size:.8rem;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer}
    .jornal-btn:hover{background:var(--chip-bg);color:var(--primary)}
    .jornal-btn-danger{color:#ef4444;border-color:#fca5a5}
    .jornal-btn-danger:hover{background:#fff3f3;color:#dc2626}
    .jornal-btn-primary{background:var(--primary);color:var(--accent);border-color:var(--primary)}
    .jornal-btn-primary:hover{background:var(--primary-hover)}
    .jornal-resultado{font-size:.82rem;font-weight:600;color:var(--badge-verde-txt);background:var(--badge-verde-bg);border-radius:20px;padding:3px 10px}

    /* MODAL JORNAL */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500;display:none;align-items:center;justify-content:center}
    .modal-overlay.aberto{display:flex}
    .modal{background:var(--surface);border-radius:14px;padding:28px;width:560px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
    .modal h3{font-size:1.1rem;font-weight:700;margin-bottom:20px}
    .modal-campo{margin-bottom:16px}
    .modal-campo label{display:block;font-size:.82rem;color:var(--text2);margin-bottom:6px;font-weight:600}
    .modal-campo input,.modal-campo select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:.9rem;background:var(--surface2);color:var(--text)}
    .modal-campo input:focus,.modal-campo select:focus{outline:none;border-color:var(--primary)}
    .kw-lista{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;min-height:32px}
    .kw-chip{background:var(--chip-bg);color:var(--primary);border:1px solid var(--chip-border);border-radius:20px;padding:4px 10px;font-size:.82rem;display:flex;align-items:center;gap:6px}
    [data-tema="escuro"] .kw-chip{color:var(--accent)}
    .kw-chip span{cursor:pointer;color:var(--text3)}
    .kw-chip span:hover{color:#ef4444}
    .modal-actions{display:flex;gap:10px;margin-top:20px;justify-content:flex-end}
    .modal-btn{padding:10px 20px;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;border:1px solid var(--border);background:var(--surface2);color:var(--text)}
    .modal-btn-primary{background:var(--primary);color:var(--accent);border-color:var(--primary)}
    .modal-btn-primary:hover{background:var(--primary-hover)}
    .kw-input-row{display:flex;gap:8px}
    .kw-input-row input{flex:1}
    .btn-add-kw{background:var(--primary);color:var(--accent);border:none;padding:10px 14px;border-radius:8px;cursor:pointer;font-size:.85rem;white-space:nowrap}

    /* DRAWER */
    .overlay{position:fixed;inset:0;background:var(--overlay);z-index:100;opacity:0;pointer-events:none;transition:opacity .25s}
    .overlay.ativo{opacity:1;pointer-events:all}
    .drawer{position:fixed;top:0;right:-660px;width:640px;max-width:95vw;height:100vh;background:var(--drawer-bg);z-index:101;box-shadow:-4px 0 24px rgba(0,0,0,.3);transition:right .3s ease;overflow-y:auto;display:flex;flex-direction:column;border-left:1px solid var(--border)}
    .drawer.ativo{right:0}
    .drawer-header{background:var(--primary);color:var(--accent);padding:20px 20px 16px;position:sticky;top:0;z-index:1}
    .drawer-header h2{font-size:1rem;font-weight:700;margin-bottom:4px}
    .drawer-sub{font-size:.8rem;color:#aaa}
    .drawer-fechar{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.15);border:none;color:#fff;width:30px;height:30px;border-radius:50%;font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
    .drawer-fechar:hover{background:rgba(255,255,255,.3)}
    .drawer-body{padding:20px;flex:1}
    .drawer-section{margin-bottom:20px}
    .drawer-section h3{font-size:.8rem;text-transform:uppercase;color:var(--text3);letter-spacing:1px;margin-bottom:8px}
    .drawer-desc{font-size:.9rem;color:var(--text);line-height:1.5}
    .drawer-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .drawer-campo{background:var(--surface2);border-radius:8px;padding:10px 12px;border:1px solid var(--border)}
    .drawer-campo label{font-size:.72rem;color:var(--text3);display:block;margin-bottom:3px;text-transform:uppercase}
    .drawer-campo span{font-size:.9rem;color:var(--text);font-weight:600}
    .drawer-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px}
    .drawer-tag{background:var(--chip-bg);color:var(--primary);border:1px solid var(--chip-border);border-radius:20px;padding:3px 10px;font-size:.78rem;font-weight:600}
    [data-tema="escuro"] .drawer-tag{color:var(--accent)}
    .drawer-btn{display:block;width:100%;padding:12px;background:var(--primary);color:var(--accent);border:none;border-radius:8px;font-size:1rem;font-weight:700;cursor:pointer;margin-bottom:10px;text-align:center}
    .drawer-btn:hover{background:var(--primary-hover)}
    .drawer-btn-sec{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
    .drawer-btn-sec:hover{background:var(--border)}
    .drawer-btn-destaque{background:#b45309;color:#fff}
    .drawer-btn-destaque:hover{background:#92400e}
    .drawer-btn-destaque.adicionado{background:#166534;color:#fff}
    .item-busca{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:.88rem;background:var(--surface2);color:var(--text);margin-bottom:10px;outline:none}
    .item-busca:focus{border-color:var(--primary)}
    .item-lista{display:flex;flex-direction:column;gap:6px}
    .item-accordion{border:1px solid var(--border);border-radius:8px;overflow:hidden}
    .item-header{display:flex;align-items:center;gap:10px;padding:10px 14px;cursor:pointer;background:var(--surface2)}
    .item-header:hover{filter:brightness(1.05)}
    .item-num-badge{background:var(--primary);color:var(--accent);border-radius:6px;padding:2px 8px;font-size:.75rem;font-weight:700;white-space:nowrap;min-width:56px;text-align:center}
    .item-resumo{flex:1}
    .item-nome{font-size:.88rem;font-weight:600;color:var(--text)}
    .item-qtd{font-size:.78rem;color:var(--text2);margin-top:2px}
    .item-chevron{color:var(--text3);font-size:.85rem;transition:transform .2s;flex-shrink:0}
    .item-chevron.aberto{transform:rotate(180deg)}
    .item-detalhe{display:none;padding:14px;background:var(--surface);border-top:1px solid var(--border)}
    .item-detalhe.aberto{display:block}
    .item-detalhe-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
    .item-detalhe-campo{background:var(--surface2);border-radius:6px;padding:8px 10px;border:1px solid var(--border)}
    .item-detalhe-campo label{font-size:.7rem;color:var(--text3);display:block;text-transform:uppercase;margin-bottom:2px}
    .item-detalhe-campo span{font-size:.85rem;font-weight:600;color:var(--text)}
    .item-desc-full{font-size:.82rem;color:var(--text2);line-height:1.5;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
    .item-loading{text-align:center;padding:20px;color:var(--text3);font-size:.9rem}

    /* NEGÓCIOS */
    .negocios-tabs{display:flex;gap:8px;margin-bottom:20px;border-bottom:1px solid var(--border)}
    .neg-tab{background:transparent;border:none;color:var(--text2);padding:10px 16px;font-size:.9rem;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px}
    .neg-tab:hover{color:var(--text)}
    .neg-tab.ativo{color:var(--primary);border-bottom-color:var(--primary);font-weight:600}
    [data-tema="escuro"] .neg-tab.ativo{color:var(--accent);border-bottom-color:var(--accent)}
    .neg-view{display:none}
    .neg-view.ativo{display:block}
    .funil{display:flex;flex-direction:column;gap:24px}
    .fase-titulo{display:flex;align-items:center;gap:10px;margin-bottom:12px}
    .fase-badge{padding:4px 12px;border-radius:20px;font-size:.8rem;font-weight:700}
    .fase-oportunidade{background:#fef3c7;color:#92400e}
    .fase-qualificacao{background:#dbeafe;color:#1e40af}
    .fase-disputa{background:#fed7aa;color:#9a3412}
    .fase-classificacao{background:#ede9fe;color:#5b21b6}
    .fase-contrato{background:#d1fae5;color:#065f46}
    [data-tema="escuro"] .fase-oportunidade{background:#2b1900;color:#fbbf24}
    [data-tema="escuro"] .fase-qualificacao{background:#0f1e3d;color:#93c5fd}
    [data-tema="escuro"] .fase-disputa{background:#2b1000;color:#fb923c}
    [data-tema="escuro"] .fase-classificacao{background:#1e1040;color:#c4b5fd}
    [data-tema="escuro"] .fase-contrato{background:#0a2e1a;color:#6ee7b7}
    .fase-count{font-size:.78rem;color:var(--text3)}
    .neg-card{background:var(--surface);border-radius:8px;padding:14px 16px;box-shadow:var(--card-shadow);border:1px solid var(--border);margin-bottom:8px}
    .neg-card-titulo{font-size:.9rem;font-weight:600;color:var(--text);margin-bottom:4px}
    .neg-card-info{font-size:.78rem;color:var(--text2);display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
    .neg-card-actions{display:flex;gap:6px;flex-wrap:wrap}
    .neg-btn{font-size:.75rem;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer}
    .neg-btn:hover{background:var(--chip-bg);color:var(--primary)}
    .neg-btn-danger{color:#ef4444;border-color:#fca5a5}
    .neg-btn-danger:hover{background:#fff3f3;color:#dc2626}
    .fase-vazio{color:var(--text3);font-size:.85rem;padding:10px 0}
    .kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;overflow-x:auto;padding-bottom:8px}
    .kanban-col{background:var(--surface2);border-radius:10px;padding:12px;border:1px solid var(--border);min-width:180px}
    .kanban-col-titulo{font-size:.82rem;font-weight:700;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
    .kanban-card{background:var(--surface);border-radius:8px;padding:10px 12px;box-shadow:var(--card-shadow);border:1px solid var(--border);margin-bottom:8px}
    .kanban-card-titulo{font-size:.82rem;font-weight:600;color:var(--text);margin-bottom:4px}
    .kanban-card-info{font-size:.72rem;color:var(--text2)}
    .kanban-vazio{font-size:.78rem;color:var(--text3);text-align:center;padding:16px 0}
    .agenda-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .agenda-mes{font-size:1.1rem;font-weight:700;color:var(--text)}
    .agenda-nav{display:flex;gap:6px}
    .agenda-nav button{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:.85rem}
    .calendario{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
    .cal-dia-semana{text-align:center;font-size:.72rem;font-weight:600;color:var(--text3);padding:4px 0}
    .cal-dia{min-height:70px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:4px 6px;font-size:.75rem}
    .cal-dia.hoje{border-color:var(--primary);background:var(--chip-bg)}
    .cal-dia.outro-mes{opacity:.4}
    .cal-dia-num{font-weight:600;color:var(--text2);margin-bottom:2px}
    .cal-evento{background:var(--primary);color:var(--accent);border-radius:3px;padding:1px 4px;font-size:.65rem;margin-bottom:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cal-evento.encerramento{background:#7f1d1d;color:#fca5a5}
    [data-tema="escuro"] .cal-evento{background:#245239}

    @media(max-width:800px){.filtros{grid-template-columns:1fr}.filtros .campo-busca{flex-direction:column}.drawer{width:100%;right:-100%}.drawer-grid{grid-template-columns:1fr}.item-detalhe-grid{grid-template-columns:1fr 1fr}.kanban{grid-template-columns:repeat(3,1fr)}.header-logo span{display:none}.nav-btn{padding:6px 10px;font-size:.82rem}}
  </style>
</head>
<body>

<!-- MODAL JORNAL -->
<div class="modal-overlay" id="modalOverlay" onclick="fecharModal(event)">
  <div class="modal">
    <h3 id="modalTitulo">Novo Jornal</h3>
    <input type="hidden" id="modalJornalId"/>
    <div class="modal-campo">
      <label>Nome do jornal</label>
      <input type="text" id="jornalNome" placeholder="ex: Papel Kraft, Embalagem"/>
    </div>
    <div class="modal-campo">
      <label>Palavras-chave (pressione Enter ou clique em +)</label>
      <div class="kw-input-row">
        <input type="text" id="kwInput" placeholder="ex: papel kraft" onkeydown="kwKeydown(event)"/>
        <button class="btn-add-kw" onclick="adicionarKw()">+ Adicionar</button>
      </div>
      <div class="kw-lista" id="kwLista"></div>
    </div>
    <div class="modal-campo">
      <label>Estado (opcional)</label>
      <select id="jornalUF">
        <option value="">Todos os estados</option>
        <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
        <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
        <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
        <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
        <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
        <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
        <option>SP</option><option>SE</option><option>TO</option>
      </select>
    </div>
    <div class="modal-campo">
      <label>Modalidade (opcional)</label>
      <select id="jornalModalidade">
        <option value="">Todas</option>
        <option value="6">Pregão Eletrônico</option>
        <option value="8">Dispensa de Licitação</option>
        <option value="4">Concorrência Eletrônica</option>
        <option value="9">Inexigibilidade</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="modal-btn" onclick="fecharModalDireto()">Cancelar</button>
      <button class="modal-btn modal-btn-primary" onclick="salvarJornal()">💾 Salvar jornal</button>
    </div>
  </div>
</div>

<header>
  <div class="header-left">
    <div class="header-logo">📋 Arantes Licitações<span>Arantes Papéis · PNCP</span></div>
    <nav class="nav">
      <button class="nav-btn ativo" id="navOportunidades" onclick="toggleDropdown('dropOportunidades')">
        🔍 Oportunidades ▾
        <div class="dropdown" id="dropOportunidades">
          <div class="dropdown-item" onclick="irParaView('busca')">🔍 Buscar Licitações</div>
          <div class="dropdown-sep"></div>
          <div class="dropdown-item" onclick="irParaView('jornais')">📰 Meus Jornais</div>
        </div>
      </button>
      <button class="nav-btn" id="navNegocios" onclick="toggleDropdown('dropNegocios')">
        💼 Negócios ▾
        <div class="dropdown" id="dropNegocios">
          <div class="dropdown-item" onclick="irParaNegocios('funil')">📊 Funil de Licitações</div>
          <div class="dropdown-item" onclick="irParaNegocios('quadros')">🗂️ Quadros</div>
          <div class="dropdown-item" onclick="irParaNegocios('agenda')">📅 Agenda</div>
        </div>
      </button>
    </nav>
  </div>
  <div class="header-right">
    <div class="notif-wrapper">
      <button class="btn-sino" onclick="toggleNotificacoes()" title="Notificações">
        🔔
        <span class="sino-badge" id="sinoBadge">0</span>
      </button>
      <div class="notif-panel" id="notifPanel">
        <div class="notif-header">
          <span>🔔 Notificações</span>
          <button onclick="limparNotificacoes()">Limpar todas</button>
        </div>
        <div id="notifLista"><div class="notif-vazia">Nenhuma notificação</div></div>
      </div>
    </div>
    <button class="btn-tema" id="btnTema" onclick="alternarTema()">🌙</button>
  </div>
</header>

<!-- VIEW BUSCAR LICITAÇÕES -->
<div class="view ativo" id="viewBusca">
  <div class="container">
    <div class="filtros">
      <div class="campo-busca">
        <input type="text" id="palavraChave" placeholder="Palavra-chave (ex: papel, bobina, kraft, embalagem...)"/>
        <button class="btn-buscar" id="btnBuscar" onclick="buscar(1)">Buscar</button>
        <button class="btn-limpar" onclick="limpar()">Limpar</button>
      </div>
      <select id="uf">
        <option value="">Todos os estados</option>
        <option>AC</option><option>AL</option><option>AP</option><option>AM</option>
        <option>BA</option><option>CE</option><option>DF</option><option>ES</option>
        <option>GO</option><option>MA</option><option>MT</option><option>MS</option>
        <option>MG</option><option>PA</option><option>PB</option><option>PR</option>
        <option>PE</option><option>PI</option><option>RJ</option><option>RN</option>
        <option>RS</option><option>RO</option><option>RR</option><option>SC</option>
        <option>SP</option><option>SE</option><option>TO</option>
      </select>
      <select id="modalidade">
        <option value="">Todas as modalidades</option>
        <option value="6">Pregão Eletrônico</option>
        <option value="8">Dispensa de Licitação</option>
        <option value="4">Concorrência Eletrônica</option>
        <option value="9">Inexigibilidade</option>
        <option value="7">Pregão Presencial</option>
        <option value="5">Concorrência Presencial</option>
      </select>
      <select id="status">
        <option value="recebendo_proposta">Recebendo proposta</option>
        <option value="em_julgamento">Em julgamento</option>
        <option value="encerrada">Encerrada</option>
        <option value="">Todos</option>
      </select>
    </div>
    <div class="historico-box" id="historicoBox">
      <div class="historico-label"><span>🕒 Buscas recentes</span><button onclick="limparHistorico()">Limpar tudo</button></div>
      <div class="historico-chips" id="historicoChips"></div>
    </div>
    <div id="resumo" class="resumo"></div>
    <div id="resultado"></div>
    <div class="paginacao" id="paginacao" style="display:none">
      <button class="btn-pag" id="btnAnterior" onclick="mudarPagina(-1)">← Anterior</button>
      <span class="pagina-info" id="paginaInfo"></span>
      <button class="btn-pag" id="btnProxima" onclick="mudarPagina(1)">Próxima →</button>
    </div>
  </div>
</div>

<!-- VIEW MEUS JORNAIS -->
<div class="view" id="viewJornais">
  <div class="container">
    <div class="jornais-header">
      <div>
        <h2>📰 Meus Jornais</h2>
        <p style="font-size:.85rem;color:var(--text3);margin-top:4px">Palavras-chave monitoradas automaticamente. Verificado toda vez que você abre o site.</p>
      </div>
      <button class="btn-novo-jornal" onclick="abrirModalNovo()">+ Novo jornal</button>
    </div>
    <div class="jornais-lista" id="jornaisLista"></div>
  </div>
</div>

<!-- VIEW NEGÓCIOS -->
<div class="view" id="viewNegocios">
  <div class="container">
    <div class="negocios-tabs">
      <button class="neg-tab ativo" id="tabFunil" onclick="mudarAbaNegocios('funil')">📊 Funil</button>
      <button class="neg-tab" id="tabQuadros" onclick="mudarAbaNegocios('quadros')">🗂️ Quadros</button>
      <button class="neg-tab" id="tabAgenda" onclick="mudarAbaNegocios('agenda')">📅 Agenda</button>
    </div>
    <div class="neg-view ativo" id="negFunil"><div class="funil" id="funilConteudo"></div></div>
    <div class="neg-view" id="negQuadros"><div class="kanban" id="kanbanConteudo"></div></div>
    <div class="neg-view" id="negAgenda">
      <div class="agenda-header">
        <div class="agenda-mes" id="agendaMes"></div>
        <div class="agenda-nav">
          <button onclick="mudarMes(-1)">◀</button>
          <button onclick="mudarMes(0)">Hoje</button>
          <button onclick="mudarMes(1)">▶</button>
        </div>
      </div>
      <div class="calendario" id="calendarioGrid"></div>
    </div>
  </div>
</div>

<!-- DRAWER -->
<div class="overlay" id="overlay" onclick="fecharDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <button class="drawer-fechar" onclick="fecharDrawer()">✕</button>
    <h2 id="d-titulo">Carregando...</h2>
    <div class="drawer-sub" id="d-numero"></div>
  </div>
  <div class="drawer-body">
    <div class="drawer-tags" id="d-tags"></div>
    <div class="drawer-section"><h3>Objeto</h3><div class="drawer-desc" id="d-objeto"></div></div>
    <div class="drawer-section">
      <div class="drawer-grid">
        <div class="drawer-campo"><label>Órgão</label><span id="d-orgao"></span></div>
        <div class="drawer-campo"><label>Unidade</label><span id="d-unidade"></span></div>
        <div class="drawer-campo"><label>Estado</label><span id="d-uf"></span></div>
        <div class="drawer-campo"><label>Modalidade</label><span id="d-modalidade"></span></div>
        <div class="drawer-campo"><label>Abertura</label><span id="d-abertura"></span></div>
        <div class="drawer-campo"><label>Encerramento</label><span id="d-encerramento"></span></div>
        <div class="drawer-campo"><label>Valor estimado</label><span id="d-valor"></span></div>
        <div class="drawer-campo"><label>Situação</label><span id="d-situacao"></span></div>
      </div>
    </div>
    <button class="drawer-btn" id="d-btn-acessar">📄 Acessar edital no PNCP</button>
    <button class="drawer-btn drawer-btn-sec" id="d-btn-busca">🔍 Buscar no PNCP</button>
    <button class="drawer-btn drawer-btn-destaque" id="d-btn-negocio" onclick="adicionarAosNegocios()">💼 Adicionar aos meus negócios</button>
    <div class="drawer-section">
      <h3>Itens do pregão</h3>
      <input type="text" class="item-busca" id="buscaItem" placeholder="🔍 Buscar item dentro desta licitação..." oninput="filtrarItens()"/>
      <div id="d-itens"><div class="item-loading">⏳ Carregando itens...</div></div>
    </div>
  </div>
</div>

<script>
  // ===== STATE =====
  let paginaAtual=1,totalPaginas=1,itemAtualDrawer=null,mesAtual=new Date(),todosItens=[];
  let kwAtual=[];
  const HIST_KEY='arantesBusca_historico';
  const TEMA_KEY='arantesBusca_tema';
  const NEG_KEY='arantesBusca_negocios';
  const JORNAIS_KEY='arantesBusca_jornais';
  const NOTIF_KEY='arantesBusca_notificacoes';
  const FASES=[
    {id:'oportunidade',nome:'Oportunidade',cls:'fase-oportunidade',emoji:'🟡'},
    {id:'qualificacao',nome:'Qualificação',cls:'fase-qualificacao',emoji:'🔵'},
    {id:'disputa',nome:'Disputa',cls:'fase-disputa',emoji:'🟠'},
    {id:'classificacao',nome:'Classificação',cls:'fase-classificacao',emoji:'🟣'},
    {id:'contrato',nome:'Contrato',cls:'fase-contrato',emoji:'🟢'},
  ];

  // ===== TEMA =====
  function alternarTema(){
    const html=document.documentElement,novo=html.getAttribute('data-tema')==='escuro'?'claro':'escuro';
    html.setAttribute('data-tema',novo);
    document.getElementById('btnTema').textContent=novo==='escuro'?'☀️':'🌙';
    localStorage.setItem(TEMA_KEY,novo);
  }
  function carregarTema(){
    const t=localStorage.getItem(TEMA_KEY)||'claro';
    document.documentElement.setAttribute('data-tema',t);
    document.getElementById('btnTema').textContent=t==='escuro'?'☀️':'🌙';
  }

  // ===== NAVEGAÇÃO =====
  function toggleDropdown(id){
    document.querySelectorAll('.dropdown').forEach(d=>{if(d.id!==id)d.classList.remove('aberto')});
    document.getElementById(id).classList.toggle('aberto');
  }
  document.addEventListener('click',e=>{
    if(!e.target.closest('.nav-btn')&&!e.target.closest('.notif-wrapper'))
      document.querySelectorAll('.dropdown,.notif-panel').forEach(d=>d.classList.remove('aberto'));
  });

  function irParaView(view){
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('ativo'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('ativo'));
    document.querySelectorAll('.dropdown').forEach(d=>d.classList.remove('aberto'));
    const viewEl=document.getElementById('view'+view.charAt(0).toUpperCase()+view.slice(1));
    if(viewEl)viewEl.classList.add('ativo');
    if(view==='busca'||view==='jornais')document.getElementById('navOportunidades').classList.add('ativo');
    if(view==='negocios')document.getElementById('navNegocios').classList.add('ativo');
    if(view==='jornais')renderJornais();
  }
  function irParaNegocios(aba){
    irParaView('negocios');
    mudarAbaNegocios(aba);
  }
  function mudarAbaNegocios(aba){
    document.querySelectorAll('.neg-tab').forEach(t=>t.classList.remove('ativo'));
    document.querySelectorAll('.neg-view').forEach(v=>v.classList.remove('ativo'));
    document.getElementById('tab'+aba.charAt(0).toUpperCase()+aba.slice(1)).classList.add('ativo');
    document.getElementById('neg'+aba.charAt(0).toUpperCase()+aba.slice(1)).classList.add('ativo');
    if(aba==='funil')renderFunil();
    if(aba==='quadros')renderQuadros();
    if(aba==='agenda')renderAgenda();
  }

  // ===== NOTIFICAÇÕES =====
  function getNotificacoes(){try{return JSON.parse(localStorage.getItem(NOTIF_KEY)||'[]')}catch{return[]}}
  function salvarNotificacoes(n){localStorage.setItem(NOTIF_KEY,JSON.stringify(n))}
  function adicionarNotificacao(titulo,desc,jornal){
    const notifs=getNotificacoes();
    notifs.unshift({id:Date.now().toString(),titulo,desc,jornal,data:new Date().toISOString(),lida:false});
    salvarNotificacoes(notifs.slice(0,50));
    renderNotificacoes();
  }
  function renderNotificacoes(){
    const notifs=getNotificacoes();
    const naoLidas=notifs.filter(n=>!n.lida).length;
    const badge=document.getElementById('sinoBadge');
    badge.textContent=naoLidas>99?'99+':naoLidas;
    badge.classList.toggle('visivel',naoLidas>0);
    const lista=document.getElementById('notifLista');
    if(!notifs.length){lista.innerHTML='<div class="notif-vazia">Nenhuma notificação</div>';return}
    lista.innerHTML=notifs.slice(0,20).map(n=>`
      <div class="notif-item" onclick="marcarLida('${n.id}')">
        <div class="notif-titulo">${n.lida?'':'🔵 '}${n.titulo}</div>
        <div class="notif-desc">${n.desc}</div>
        <div class="notif-data">${new Date(n.data).toLocaleString('pt-BR')}</div>
      </div>`).join('');
  }
  function marcarLida(id){
    const notifs=getNotificacoes();
    const n=notifs.find(x=>x.id===id);
    if(n)n.lida=true;
    salvarNotificacoes(notifs);
    renderNotificacoes();
  }
  function limparNotificacoes(){
    salvarNotificacoes([]);
    renderNotificacoes();
    document.getElementById('notifPanel').classList.remove('aberto');
  }
  function toggleNotificacoes(){
    const panel=document.getElementById('notifPanel');
    panel.classList.toggle('aberto');
    if(panel.classList.contains('aberto')){
      const notifs=getNotificacoes().map(n=>({...n,lida:true}));
      salvarNotificacoes(notifs);
      renderNotificacoes();
    }
  }

  // ===== JORNAIS =====
  function getJornais(){try{return JSON.parse(localStorage.getItem(JORNAIS_KEY)||'[]')}catch{return[]}}
  function salvarJornaisLS(j){localStorage.setItem(JORNAIS_KEY,JSON.stringify(j))}

  function abrirModalNovo(){
    document.getElementById('modalTitulo').textContent='Novo Jornal';
    document.getElementById('modalJornalId').value='';
    document.getElementById('jornalNome').value='';
    document.getElementById('jornalUF').value='';
    document.getElementById('jornalModalidade').value='';
    kwAtual=[];
    renderKwLista();
    document.getElementById('modalOverlay').classList.add('aberto');
    document.getElementById('kwInput').focus();
  }
  function editarJornal(id){
    const j=getJornais().find(x=>x.id===id);
    if(!j)return;
    document.getElementById('modalTitulo').textContent='Editar Jornal';
    document.getElementById('modalJornalId').value=id;
    document.getElementById('jornalNome').value=j.nome;
    document.getElementById('jornalUF').value=j.uf||'';
    document.getElementById('jornalModalidade').value=j.modalidade||'';
    kwAtual=[...j.palavrasChave];
    renderKwLista();
    document.getElementById('modalOverlay').classList.add('aberto');
  }
  function fecharModal(e){if(e.target===document.getElementById('modalOverlay'))fecharModalDireto()}
  function fecharModalDireto(){document.getElementById('modalOverlay').classList.remove('aberto')}

  function kwKeydown(e){if(e.key==='Enter'){e.preventDefault();adicionarKw()}}
  function adicionarKw(){
    const input=document.getElementById('kwInput');
    const val=input.value.trim();
    if(val&&!kwAtual.includes(val)){kwAtual.push(val);renderKwLista()}
    input.value='';input.focus();
  }
  function removerKw(i){kwAtual.splice(i,1);renderKwLista()}
  function renderKwLista(){
    document.getElementById('kwLista').innerHTML=kwAtual.map((k,i)=>
      `<span class="kw-chip">${k}<span onclick="removerKw(${i})">✕</span></span>`).join('');
  }

  function salvarJornal(){
    const nome=document.getElementById('jornalNome').value.trim();
    if(!nome){alert('Dê um nome ao jornal');return}
    if(!kwAtual.length){alert('Adicione ao menos uma palavra-chave');return}
    const jornais=getJornais();
    const id=document.getElementById('modalJornalId').value;
    const jornal={
      id:id||Date.now().toString(),
      nome,
      palavrasChave:[...kwAtual],
      uf:document.getElementById('jornalUF').value,
      modalidade:document.getElementById('jornalModalidade').value,
      criadoEm:id?jornais.find(j=>j.id===id)?.criadoEm:new Date().toISOString(),
      ultimaVerificacao:null,
      ultimoTotal:0,
    };
    if(id){const idx=jornais.findIndex(j=>j.id===id);if(idx>=0)jornais[idx]=jornal;else jornais.unshift(jornal);}
    else jornais.unshift(jornal);
    salvarJornaisLS(jornais);
    fecharModalDireto();
    renderJornais();
  }

  function removerJornal(id){
    if(!confirm('Remover este jornal?'))return;
    salvarJornaisLS(getJornais().filter(j=>j.id!==id));
    renderJornais();
  }

  async function verificarJornal(id){
    const jornais=getJornais();
    const j=jornais.find(x=>x.id===id);
    if(!j)return;
    const el=document.getElementById('jornal-resultado-'+id);
    if(el)el.textContent='⏳ Verificando...';
    let totalNovos=0;
    for(const kw of j.palavrasChave){
      try{
        const params=new URLSearchParams({palavraChave:kw,pagina:1,status:'recebendo_proposta'});
        if(j.uf)params.append('uf',j.uf);
        if(j.modalidade)params.append('modalidade',j.modalidade);
        const r=await fetch(`/api/buscar?${params}`);
        const data=await r.json();
        totalNovos+=data.totalRegistros||0;
      }catch(e){}
    }
    const anteriorTotal=j.ultimoTotal||0;
    j.ultimaVerificacao=new Date().toISOString();
    j.ultimoTotal=totalNovos;
    salvarJornaisLS(jornais);
    if(totalNovos>anteriorTotal&&anteriorTotal>0){
      const diff=totalNovos-anteriorTotal;
      adicionarNotificacao(
        `📰 ${j.nome}`,
        `${diff} nova(s) licitação(ões) encontrada(s) para "${j.palavrasChave.join(', ')}"`,
        j.nome
      );
    }
    renderJornais();
  }

  async function verificarTodosJornais(){
    const jornais=getJornais();
    if(!jornais.length)return;
    for(const j of jornais)await verificarJornal(j.id);
  }

  function executarBuscaJornal(j){
    irParaView('busca');
    document.getElementById('palavraChave').value=j.palavrasChave[0]||'';
    document.getElementById('uf').value=j.uf||'';
    document.getElementById('modalidade').value=j.modalidade||'';
    buscar(1);
  }

  function renderJornais(){
    const jornais=getJornais();
    const lista=document.getElementById('jornaisLista');
    if(!jornais.length){
      lista.innerHTML=`<div class="vazio">Nenhum jornal criado ainda.<br><br>
        <button class="btn-novo-jornal" onclick="abrirModalNovo()">+ Criar primeiro jornal</button></div>`;
      return;
    }
    lista.innerHTML=jornais.map(j=>`
      <div class="jornal-card">
        <div class="jornal-card-header">
          <div class="jornal-nome">📰 ${j.nome}</div>
          ${j.ultimoTotal?`<span class="jornal-resultado" id="jornal-resultado-${j.id}">${j.ultimoTotal.toLocaleString('pt-BR')} licitações</span>`:`<span id="jornal-resultado-${j.id}" style="font-size:.78rem;color:var(--text3)">Não verificado</span>`}
        </div>
        <div class="jornal-chips">
          ${j.palavrasChave.map(k=>`<span class="jornal-chip">🔍 ${k}</span>`).join('')}
          ${j.uf?`<span class="jornal-chip">📍 ${j.uf}</span>`:''}
          ${j.modalidade?`<span class="jornal-chip">📋 ${['','','','','Concorrência','Concorrência Presencial','Pregão Eletrônico','Pregão Presencial','Dispensa','Inexigibilidade'][j.modalidade]||j.modalidade}</span>`:''}
        </div>
        <div class="jornal-meta">
          ${j.ultimaVerificacao?`Última verificação: ${new Date(j.ultimaVerificacao).toLocaleString('pt-BR')}`:'Ainda não verificado'}
        </div>
        <div class="jornal-actions">
          <button class="jornal-btn jornal-btn-primary" onclick="executarBuscaJornal(${JSON.stringify(j).replace(/"/g,'&quot;')})">🔍 Ver licitações</button>
          <button class="jornal-btn" onclick="verificarJornal('${j.id}')">↻ Verificar agora</button>
          <button class="jornal-btn" onclick="editarJornal('${j.id}')">✎ Editar</button>
          <button class="jornal-btn jornal-btn-danger" onclick="removerJornal('${j.id}')">✕ Remover</button>
        </div>
      </div>`).join('');
  }

  // ===== NEGÓCIOS =====
  function getNegocios(){try{return JSON.parse(localStorage.getItem(NEG_KEY)||'[]')}catch{return[]}}
  function salvarNegocios(n){localStorage.setItem(NEG_KEY,JSON.stringify(n))}
  function adicionarAosNegocios(){
    if(!itemAtualDrawer)return;
    const negs=getNegocios();
    if(negs.find(n=>n.numero_controle===itemAtualDrawer.numero_controle_pncp)){alert('Já está nos seus negócios!');return}
    const p=parseControle(itemAtualDrawer.numero_controle_pncp);
    negs.unshift({
      id:Date.now().toString(),titulo:itemAtualDrawer.title||'Sem título',
      objeto:itemAtualDrawer.description||'',orgao:itemAtualDrawer.orgao_nome||'',
      uf:itemAtualDrawer.uf||'',modalidade:itemAtualDrawer.modalidade_licitacao_nome||'',
      abertura:itemAtualDrawer.data_inicio_vigencia||'',encerramento:itemAtualDrawer.data_fim_vigencia||'',
      numero_controle:itemAtualDrawer.numero_controle_pncp||'',
      link_pncp:p?`https://pncp.gov.br/app/editais/${p.cnpj}/${p.ano}/${p.seq}`:'',
      fase:'oportunidade',adicionado_em:new Date().toISOString(),
    });
    salvarNegocios(negs);
    const btn=document.getElementById('d-btn-negocio');
    btn.textContent='✅ Adicionado!';btn.classList.add('adicionado');
    setTimeout(()=>{btn.textContent='💼 Adicionar aos meus negócios';btn.classList.remove('adicionado')},2500);
  }
  function moverFase(id,fase){const negs=getNegocios(),n=negs.find(x=>x.id===id);if(n){n.fase=fase;salvarNegocios(negs);renderFunil();renderQuadros()}}
  function removerNegocio(id){if(!confirm('Remover?'))return;salvarNegocios(getNegocios().filter(n=>n.id!==id));renderFunil();renderQuadros();renderAgenda()}
  function renderFunil(){
    const negs=getNegocios();
    document.getElementById('funilConteudo').innerHTML=FASES.map(f=>{
      const itens=negs.filter(n=>n.fase===f.id);
      return`<div class="fase-grupo"><div class="fase-titulo"><span class="fase-badge ${f.cls}">${f.emoji} ${f.nome}</span><span class="fase-count">${itens.length} licitação(ões)</span></div>
        ${itens.length===0?'<div class="fase-vazio">Nenhuma licitação nesta fase.</div>':itens.map(n=>`<div class="neg-card">
          <div class="neg-card-titulo">${n.titulo}</div>
          <div class="neg-card-info"><span>📍 ${n.uf}</span><span>📋 ${n.modalidade}</span><span>⏰ ${n.encerramento?new Date(n.encerramento).toLocaleDateString('pt-BR'):'—'}</span></div>
          <div class="neg-card-actions">
            <select onchange="moverFase('${n.id}',this.value)" style="font-size:.75rem;padding:3px 6px;border:1px solid var(--border);border-radius:6px;background:var(--surface2);color:var(--text);cursor:pointer">
              ${FASES.map(f2=>`<option value="${f2.id}"${f2.id===n.fase?' selected':''}>${f2.emoji} ${f2.nome}</option>`).join('')}
            </select>
            ${n.link_pncp?`<button class="neg-btn" onclick="window.open('${n.link_pncp}','_blank')">📄 PNCP</button>`:''}
            <button class="neg-btn neg-btn-danger" onclick="removerNegocio('${n.id}')">✕</button>
          </div></div>`).join('')}</div>`;
    }).join('');
  }
  function renderQuadros(){
    const negs=getNegocios();
    document.getElementById('kanbanConteudo').innerHTML=FASES.map(f=>{
      const itens=negs.filter(n=>n.fase===f.id);
      return`<div class="kanban-col"><div class="kanban-col-titulo"><span class="fase-badge ${f.cls}">${f.emoji} ${f.nome}</span></div>
        ${itens.length===0?'<div class="kanban-vazio">—</div>':itens.map(n=>`<div class="kanban-card">
          <div class="kanban-card-titulo">${n.titulo.substring(0,60)}${n.titulo.length>60?'...':''}</div>
          <div class="kanban-card-info">📍 ${n.uf} · ⏰ ${n.encerramento?new Date(n.encerramento).toLocaleDateString('pt-BR'):'—'}</div>
        </div>`).join('')}</div>`;
    }).join('');
  }
  function renderAgenda(){
    const negs=getNegocios(),ano=mesAtual.getFullYear(),mes=mesAtual.getMonth();
    document.getElementById('agendaMes').textContent=mesAtual.toLocaleString('pt-BR',{month:'long',year:'numeric'}).replace(/^\w/,c=>c.toUpperCase());
    const primeiroDia=new Date(ano,mes,1).getDay(),diasNoMes=new Date(ano,mes+1,0).getDate(),hoje=new Date();
    let grid='';
    ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].forEach(d=>{grid+=`<div class="cal-dia-semana">${d}</div>`});
    for(let i=0;i<primeiroDia;i++)grid+=`<div class="cal-dia outro-mes"></div>`;
    for(let d=1;d<=diasNoMes;d++){
      const ehHoje=new Date(ano,mes,d).toDateString()===hoje.toDateString();
      const eventos=negs.filter(n=>{
        const ab=n.abertura?new Date(n.abertura):null,en=n.encerramento?new Date(n.encerramento):null;
        return(ab&&ab.getDate()===d&&ab.getMonth()===mes&&ab.getFullYear()===ano)||(en&&en.getDate()===d&&en.getMonth()===mes&&en.getFullYear()===ano);
      });
      grid+=`<div class="cal-dia${ehHoje?' hoje':''}"><div class="cal-dia-num">${d}</div>${eventos.map(n=>{
        const ab=n.abertura?new Date(n.abertura):null,ehAb=ab&&ab.getDate()===d&&ab.getMonth()===mes&&ab.getFullYear()===ano;
        return`<div class="cal-evento${ehAb?'':' encerramento'}">${ehAb?'📅':'⏰'} ${n.titulo.substring(0,20)}</div>`;
      }).join('')}</div>`;
    }
    document.getElementById('calendarioGrid').innerHTML=grid;
  }
  function mudarMes(dir){if(dir===0)mesAtual=new Date();else mesAtual=new Date(mesAtual.getFullYear(),mesAtual.getMonth()+dir,1);renderAgenda()}

  // ===== HISTÓRICO =====
  function getHistorico(){try{return JSON.parse(localStorage.getItem(HIST_KEY)||'[]')}catch{return[]}}
  function salvarHistorico(kw,uf,mod,st){
    if(!kw)return;
    const h=getHistorico().filter(x=>x.kw!==kw);
    h.unshift({kw,uf,mod,st});
    localStorage.setItem(HIST_KEY,JSON.stringify(h.slice(0,15)));
    renderHistorico();
  }
  function renderHistorico(){
    const h=getHistorico(),box=document.getElementById('historicoBox');
    if(!h.length){box.style.display='none';return}
    box.style.display='block';
    document.getElementById('historicoChips').innerHTML=h.map((x,i)=>`
      <span class="chip" onclick="aplicarHistorico(${i})">${x.kw}${x.uf?' · '+x.uf:''}
        <span class="chip-x" onclick="event.stopPropagation();removerHistorico(${i})">✕</span>
      </span>`).join('');
  }
  function aplicarHistorico(i){const h=getHistorico()[i];if(!h)return;document.getElementById('palavraChave').value=h.kw;document.getElementById('uf').value=h.uf||'';document.getElementById('modalidade').value=h.mod||'';document.getElementById('status').value=h.st||'recebendo_proposta';buscar(1)}
  function removerHistorico(i){const h=getHistorico();h.splice(i,1);localStorage.setItem(HIST_KEY,JSON.stringify(h));renderHistorico()}
  function limparHistorico(){localStorage.removeItem(HIST_KEY);renderHistorico()}

  // ===== UTILS =====
  function fmt(iso){if(!iso)return'—';return new Date(iso).toLocaleString('pt-BR',{dateStyle:'short',timeStyle:'short'})}
  function fmtVal(v){if(!v)return'Não informado';return Number(v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}
  function statusBadge(item){
    if(item.cancelado)return{texto:'Cancelado',cls:'badge-cinza'};
    const agora=new Date(),fim=item.data_fim_vigencia?new Date(item.data_fim_vigencia):null,ini=item.data_inicio_vigencia?new Date(item.data_inicio_vigencia):null;
    if(fim&&agora>fim)return{texto:'Encerrado',cls:'badge-cinza'};
    if(ini&&agora>=ini)return{texto:'Recebendo proposta',cls:'badge-verde'};
    return{texto:'Aguardando abertura',cls:'badge-amarelo'};
  }
  function parseControle(c){
    if(!c)return null;
    const m=c.match(/^(\d+)-(\d+)-(\d+)\/(\d+)$/);
    if(!m)return null;
    return{cnpj:m[1],seqOrgao:m[2],seq:parseInt(m[3]),ano:m[4]};
  }
  function buildLinks(item){
    const p=parseControle(item.numero_controle_pncp);
    if(!p)return{direto:''};
    return{direto:`https://pncp.gov.br/app/editais/${p.cnpj}/${p.ano}/${p.seq}`};
  }

  // ===== DRAWER =====
  function toggleItem(i){document.getElementById('det-'+i).classList.toggle('aberto');document.getElementById('chev-'+i).classList.toggle('aberto')}
  function renderItens(itens){
    if(!itens.length){document.getElementById('d-itens').innerHTML='<div class="item-loading">Nenhum item encontrado.</div>';return}
    document.getElementById('d-itens').innerHTML=`<div class="item-lista">${itens.map((it,i)=>{
      const nome=(it.descricao||'Sem descrição').substring(0,70)+((it.descricao||'').length>70?'...':'');
      const val=it.valorUnitarioEstimado?fmtVal(it.valorUnitarioEstimado):'Não informado';
      const valT=it.valorTotal?fmtVal(it.valorTotal):'Não informado';
      return`<div class="item-accordion"><div class="item-header" onclick="toggleItem(${i})">
        <span class="item-num-badge">Item ${it.numeroItem||i+1}</span>
        <div class="item-resumo"><div class="item-nome">${nome}</div><div class="item-qtd">Qtd: <strong>${it.quantidade||'—'} ${it.unidadeMedida||''}</strong></div></div>
        <span class="item-chevron" id="chev-${i}">▼</span></div>
        <div class="item-detalhe" id="det-${i}">
          <div class="item-detalhe-grid">
            <div class="item-detalhe-campo"><label>Quantidade</label><span>${it.quantidade||'—'} ${it.unidadeMedida||''}</span></div>
            <div class="item-detalhe-campo"><label>Vlr. unitário</label><span>${val}</span></div>
            <div class="item-detalhe-campo"><label>Vlr. total</label><span>${valT}</span></div>
            <div class="item-detalhe-campo"><label>Tipo</label><span>${it.materialOuServicoNome||'—'}</span></div>
            <div class="item-detalhe-campo"><label>Situação</label><span>${it.situacaoCompraItemNome||'—'}</span></div>
            <div class="item-detalhe-campo"><label>Julgamento</label><span>${it.criterioJulgamentoNome||'—'}</span></div>
          </div>
          <div class="item-desc-full">${it.descricao||'Sem descrição'}</div>
        </div></div>`;
    }).join('')}</div>`;
  }
  function filtrarItens(){
    const t=document.getElementById('buscaItem').value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
    renderItens(t?todosItens.filter(it=>(it.descricao||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').includes(t)):todosItens);
  }
  function abrirDrawer(item){
    itemAtualDrawer=item;
    const{direto}=buildLinks(item);
    const badge=statusBadge(item);
    document.getElementById('d-titulo').textContent=item.title||'Sem título';
    document.getElementById('d-numero').textContent=item.numero_controle_pncp||'';
    document.getElementById('d-objeto').textContent=item.description||'—';
    document.getElementById('d-orgao').textContent=item.orgao_nome||'—';
    document.getElementById('d-unidade').textContent=item.unidade_nome||'—';
    document.getElementById('d-uf').textContent=(item.uf||'—')+' · '+(item.municipio_nome||'');
    document.getElementById('d-modalidade').textContent=item.modalidade_licitacao_nome||'—';
    document.getElementById('d-abertura').textContent=fmt(item.data_inicio_vigencia);
    document.getElementById('d-encerramento').textContent=fmt(item.data_fim_vigencia);
    document.getElementById('d-valor').textContent=fmtVal(item.valor_global);
    document.getElementById('d-situacao').textContent=badge.texto;
    document.getElementById('d-tags').innerHTML=`<span class="drawer-tag">${item.modalidade_licitacao_nome||'—'}</span><span class="drawer-tag badge ${badge.cls}">${badge.texto}</span>${item.esfera_nome?`<span class="drawer-tag">${item.esfera_nome}</span>`:''}`;
    document.getElementById('d-btn-acessar').onclick=()=>window.open(direto,'_blank');
    document.getElementById('d-btn-busca').onclick=()=>window.open(direto,'_blank');
    document.getElementById('d-btn-acessar').style.display=direto?'block':'none';
    const jaAdicionado=getNegocios().some(n=>n.numero_controle===item.numero_controle_pncp);
    const btnNeg=document.getElementById('d-btn-negocio');
    btnNeg.textContent=jaAdicionado?'✅ Já nos seus negócios':'💼 Adicionar aos meus negócios';
    btnNeg.classList.toggle('adicionado',jaAdicionado);
    document.getElementById('buscaItem').value='';todosItens=[];
    document.getElementById('d-itens').innerHTML='<div class="item-loading">⏳ Carregando itens...</div>';
    document.getElementById('drawer').classList.add('ativo');
    document.getElementById('overlay').classList.add('ativo');
    document.body.style.overflow='hidden';
    const p=parseControle(item.numero_controle_pncp);
    if(p)carregarItens(p.cnpj,p.ano,p.seq);
  }
  function fecharDrawer(){
    document.getElementById('drawer').classList.remove('ativo');
    document.getElementById('overlay').classList.remove('ativo');
    document.body.style.overflow='';itemAtualDrawer=null;
  }
  async function carregarItens(cnpj,ano,seq){
    try{
      const r=await fetch(`/api/itens?cnpj=${cnpj}&ano=${ano}&sequencial=${seq}`);
      const data=await r.json();
      todosItens=data.data||[];
      renderItens(todosItens);
    }catch(e){document.getElementById('d-itens').innerHTML='<div class="item-loading">Erro ao carregar itens.</div>'}
  }

  // ===== BUSCA =====
  async function buscar(pagina){
    paginaAtual=pagina;
    const kw=document.getElementById('palavraChave').value.trim();
    const uf=document.getElementById('uf').value,mod=document.getElementById('modalidade').value,st=document.getElementById('status').value;
    const params=new URLSearchParams({pagina});
    if(kw)params.append('palavraChave',kw);
    if(uf)params.append('uf',uf);
    if(mod)params.append('modalidade',mod);
    if(st)params.append('status',st);
    const btn=document.getElementById('btnBuscar');
    btn.disabled=true;btn.textContent='Buscando...';
    document.getElementById('resultado').innerHTML='<div class="loading">⏳ Buscando licitações...</div>';
    document.getElementById('paginacao').style.display='none';document.getElementById('resumo').innerHTML='';
    try{
      const resp=await fetch(`/api/buscar?${params}`);
      const data=await resp.json();
      if(data.erro){document.getElementById('resultado').innerHTML=`<div class="erro">Erro: ${data.erro}</div>`;return}
      salvarHistorico(kw,uf,mod,st);
      const itens=data.data||[],total=data.totalRegistros||0;
      totalPaginas=data.totalPaginas||1;
      document.getElementById('resumo').innerHTML=`<strong>${total.toLocaleString('pt-BR')}</strong> licitações encontradas · Página ${paginaAtual} de ${totalPaginas}`;
      if(!itens.length){document.getElementById('resultado').innerHTML='<div class="vazio">Nenhuma licitação encontrada.</div>';return}
      document.getElementById('resultado').innerHTML=`<div class="cards">${itens.map(item=>{
        const badge=statusBadge(item);
        return`<div class="card" onclick='abrirDrawer(${JSON.stringify(item)})'>
          <div class="card-header"><div class="card-titulo">${item.title||'Sem título'}</div><span class="badge ${badge.cls}">${badge.texto}</span></div>
          <div class="card-desc">${item.description||'—'}</div>
          <div class="card-info"><span>📍 ${item.uf||'—'} · ${item.municipio_nome||''}</span><span>📋 ${item.modalidade_licitacao_nome||'—'}</span><span>📅 Abertura: ${fmt(item.data_inicio_vigencia)}</span><span>⏰ Encerra: ${fmt(item.data_fim_vigencia)}</span></div>
          <div class="card-orgao">🏛️ ${item.orgao_nome||'—'}</div>
        </div>`;
      }).join('')}</div>`;
      document.getElementById('paginacao').style.display='flex';
      document.getElementById('paginaInfo').textContent=`Página ${paginaAtual} de ${totalPaginas}`;
      document.getElementById('btnAnterior').disabled=paginaAtual<=1;
      document.getElementById('btnProxima').disabled=paginaAtual>=totalPaginas;
    }catch(e){document.getElementById('resultado').innerHTML=`<div class="erro">Erro de conexão: ${e.message}</div>`;}
    finally{btn.disabled=false;btn.textContent='Buscar'}
  }
  function mudarPagina(d){const n=paginaAtual+d;if(n>=1&&n<=totalPaginas)buscar(n)}
  function limpar(){
    document.getElementById('palavraChave').value='';document.getElementById('uf').value='';
    document.getElementById('modalidade').value='';document.getElementById('status').value='recebendo_proposta';
    document.getElementById('resultado').innerHTML='';document.getElementById('resumo').innerHTML='';
    document.getElementById('paginacao').style.display='none';
  }
  document.getElementById('palavraChave').addEventListener('keydown',e=>{if(e.key==='Enter')buscar(1)});

  // ===== INIT =====
  carregarTema();
  renderHistorico();
  renderNotificacoes();
  // Verificar jornais automaticamente ao abrir
  setTimeout(()=>verificarTodosJornais(),2000);
</script>
</body>
</html>
